<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Majlis AI Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="chat-container glass-panel">
        <!-- Header -->
        <header class="chat-header">
            <div class="logo-icon"><i class="fas fa-robot"></i></div>
            <div class="header-info">
                <h1>Majlis Assistance Bot</h1>
                <p>Online | Reply time: Instant</p>
            </div>
            <a href="https://majlispolytechnic.linways.com/" target="_blank" class="header-btn" title="Go to Linways">
                <i class="fas fa-external-link-alt"></i>
            </a>
        </header>

        <!-- Chat Area -->
        <div id="chatWindow" class="chat-window">
            <div class="message bot-message">
                <div class="bubble">
                    Hello! I'm the Majlis AI Assistant. Ask me about Syllabus, Fees, or Facilities!
                </div>
            </div>
            <div class="options-container">
                <button class="option-btn" onclick="sendMessage('Syllabus')">Syllabus</button>
                <button class="option-btn" onclick="sendMessage('Fee Payment')">Fee Payment</button>
                <button class="option-btn" onclick="sendMessage('Admissions')">Admissions</button>
                <button class="option-btn" onclick="sendMessage('Hostel')">Hostel</button>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area glass-panel">
            <input type="text" id="userInput" placeholder="Type your question..." autocomplete="off">
            <button id="sendBtn" onclick="handleSend()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
