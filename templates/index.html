<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Majlis AI — Helpdesk</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="app">
    <div class="sidebar-backdrop" id="sidebarBackdrop" aria-hidden="true"></div>

    <aside class="sidebar" id="sidebar" aria-label="Chat history">
        <div class="sidebar-brand">
            <div class="brand-mark" aria-hidden="true">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <div class="brand-text">
                <span class="brand-name">Majlis</span>
                <span class="brand-sub">AI Helpdesk</span>
            </div>
        </div>

        <button type="button" class="btn btn-primary sidebar-new" id="newChatBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            New chat
        </button>

        <div class="sidebar-section">
            <h2 class="sidebar-heading">Chat history</h2>
            <ul class="history-list" id="historyList"></ul>
            <p class="history-empty" id="historyEmpty">No conversations yet. Send a message to start.</p>
        </div>
    </aside>

    <div class="main">
        <header class="topbar">
            <button type="button" class="icon-btn menu-toggle" id="menuToggle" aria-label="Open chat history">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
            <div class="topbar-title">
                <h1>Conversation</h1>
                <p class="topbar-meta"><span class="status-dot" aria-hidden="true"></span> Online · Instant replies</p>
            </div>
            <a href="https://majlispolytechnic.linways.com/" target="_blank" rel="noopener noreferrer" class="btn btn-ghost topbar-link" title="Open Linways portal">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span class="link-text">Linways</span>
            </a>
        </header>

        <div class="chat-stage">
            <div class="chat-panel">
                <div id="chatWindow" class="chat-window">
                    <div class="message bot-message">
                        <div class="bubble">
                            Hello! I'm the Majlis AI Assistant. Ask me about Syllabus, Fees, or Facilities!
                        </div>
                    </div>
                    <div class="options-container" id="initialOptions">
                        <button type="button" class="option-btn" data-send="Syllabus">Syllabus</button>
                        <button type="button" class="option-btn" data-send="Fee Payment">Fee Payment</button>
                        <button type="button" class="option-btn" data-send="Admissions">Admissions</button>
                        <button type="button" class="option-btn" data-send="Hostel">Hostel</button>
                    </div>
                </div>

                <footer class="composer">
                    <div class="composer-inner">
                        <button type="button" class="btn btn-secondary composer-clear" id="clearChatBtn" title="Clear this chat">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                <path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6h14zM10 11v6M14 11v6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            <span class="clear-label">Clear chat</span>
                        </button>
                        <label class="input-wrap">
                            <span class="sr-only">Message</span>
                            <input type="text" id="userInput" placeholder="Ask about syllabus, fees, admissions…" autocomplete="off">
                        </label>
                        <button type="button" class="btn btn-primary send-btn" id="sendBtn" aria-label="Send message">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                    </div>
                </footer>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
